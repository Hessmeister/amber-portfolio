backend:
  name: git-gateway
  branch: main

media_folder: assets/images
public_folder: assets/images

collections:

  # ── Selected Work (homepage grid) ──────────────────────────────────────────
  - name: projects
    label: Selected Work
    files:
      - name: projects
        label: Selected Work
        file: data/projects.json
        fields:
          - label: Projects
            name: projects
            widget: list
            collapsed: true
            summary: "{{fields.title}} — {{fields.type}} ({{fields.year}})"
            fields:
              - { label: Title, name: title, widget: string }
              - label: Category
                name: category
                widget: select
                options:
                  - { label: Commercial,  value: commercial }
                  - { label: Film,        value: film }
                  - { label: Music Video, value: music-video }
                  - { label: Documentary, value: documentary }
                  - { label: Fashion,     value: fashion }
              - { label: "Type Label", name: type, widget: string,
                  hint: "Label shown on card — e.g. 'Short Film', 'Fashion Film', 'Commercial'" }
              - { label: Year, name: year, widget: string }
              - label: Thumbnail
                name: thumbnail
                widget: image
                required: false
                media_folder: /assets/images/thumbnails
                public_folder: assets/images/thumbnails
                hint: "Leave blank to auto-fetch from Vimeo"
              - { label: "Vimeo ID",   name: vimeo_id,   widget: string, required: false,
                  hint: "Numbers only — e.g. 1073861924" }
              - { label: "YouTube ID", name: youtube_id, widget: string, required: false,
                  hint: "The part after watch?v= — e.g. ArZE6e1M-Rc" }
              - label: Credits
                name: credits
                widget: object
                fields:
                  - { label: Director,             name: Director,           widget: string, required: false }
                  - { label: Directors,             name: Directors,          widget: string, required: false }
                  - { label: Production,            name: Production,         widget: string, required: false }
                  - { label: Agency,                name: Agency,             widget: string, required: false }
                  - { label: DOP,                   name: DOP,                widget: string, required: false }
                  - { label: Producer,              name: Producer,           widget: string, required: false }
                  - { label: VFX,                   name: VFX,                widget: string, required: false }
                  - { label: Grade,                 name: Grade,              widget: string, required: false }
                  - { label: "Colour Grade",        name: "Colour Grade",     widget: string, required: false }
                  - { label: Colourist,             name: Colourist,          widget: string, required: false }
                  - { label: Music,                 name: Music,              widget: string, required: false }
                  - { label: "Music & Sound",       name: "Music & Sound",    widget: string, required: false }
                  - { label: "Sound Design",        name: "Sound Design",     widget: string, required: false }
                  - { label: Sound,                 name: Sound,              widget: string, required: false }
                  - { label: "Written by",          name: "Written by",       widget: string, required: false }
                  - { label: "Additional Editing",  name: "Additional Editing", widget: string, required: false }
                  - { label: "Art Direction",       name: "Art Direction",    widget: string, required: false }
                  - { label: "Grade & VFX",         name: "Grade & VFX",      widget: string, required: false }
                  - { label: "Online & Finishing",  name: "Online & Finishing", widget: string, required: false }
                  - { label: "Post Production",     name: "Post Production",  widget: string, required: false }

  # ── Archive (all projects) ──────────────────────────────────────────────────
  - name: archive
    label: Archive
    files:
      - name: archive
        label: Archive
        file: data/archive.json
        fields:
          - label: Projects
            name: projects
            widget: list
            summary: "{{fields.title}} — {{fields.category}} ({{fields.year}})"
            fields:
              - { label: Title,    name: title,    widget: string }
              - label: Category
                name: category
                widget: select
                options:
                  - { label: Commercial,  value: commercial }
                  - { label: Film,        value: film }
                  - { label: Music Video, value: music-video }
                  - { label: Documentary, value: documentary }
                  - { label: Fashion,     value: fashion }
              - { label: Year, name: year, widget: string }
              - { label: "Vimeo ID",   name: vimeo_id,   widget: string, required: false,
                  hint: "Numbers only — e.g. 1073861924" }
              - { label: "YouTube ID", name: youtube_id, widget: string, required: false,
                  hint: "The part after watch?v= — e.g. ArZE6e1M-Rc" }
              - { label: "Thumbnail URL", name: thumbnail_url, widget: string, required: false,
                  hint: "Vimeo thumbnail URL — leave blank to auto-fetch from Vimeo" }
              - label: Credits
                name: credits
                widget: object
                fields:
                  - { label: Director,             name: Director,           widget: string, required: false }
                  - { label: Directors,             name: Directors,          widget: string, required: false }
                  - { label: Production,            name: Production,         widget: string, required: false }
                  - { label: Agency,                name: Agency,             widget: string, required: false }
                  - { label: DOP,                   name: DOP,                widget: string, required: false }
                  - { label: Producer,              name: Producer,           widget: string, required: false }
                  - { label: VFX,                   name: VFX,                widget: string, required: false }
                  - { label: Grade,                 name: Grade,              widget: string, required: false }
                  - { label: "Colour Grade",        name: "Colour Grade",     widget: string, required: false }
                  - { label: Colourist,             name: Colourist,          widget: string, required: false }
                  - { label: Music,                 name: Music,              widget: string, required: false }
                  - { label: "Music & Sound",       name: "Music & Sound",    widget: string, required: false }
                  - { label: "Sound Design",        name: "Sound Design",     widget: string, required: false }
                  - { label: Sound,                 name: Sound,              widget: string, required: false }
                  - { label: "Written by",          name: "Written by",       widget: string, required: false }
                  - { label: "Additional Editing",  name: "Additional Editing", widget: string, required: false }
                  - { label: "Art Direction",       name: "Art Direction",    widget: string, required: false }
                  - { label: "Grade & VFX",         name: "Grade & VFX",      widget: string, required: false }
                  - { label: "Online & Finishing",  name: "Online & Finishing", widget: string, required: false }
                  - { label: "Post Production",     name: "Post Production",  widget: string, required: false }

  # ── About & Contact ────────────────────────────────────────────────────────
  - name: about
    label: About & Contact
    files:
      - name: about
        label: About & Contact
        file: data/about.json
        fields:
          - { label: "Showreel Vimeo ID", name: showreel_vimeo_id, widget: string,
              hint: "Numbers only — e.g. 1073861924. Changing this updates the video on the homepage." }
          - { label: "Lead Paragraph", name: bio_lead, widget: text }
          - label: "Bio Paragraphs"
            name: bio_body
            widget: list
            field: { label: Paragraph, name: paragraph, widget: text }
          - label: Tools
            name: tools
            widget: list
            field: { label: Tool, name: tool, widget: string }
          - label: Specialties
            name: specialties
            widget: list
            field: { label: Specialty, name: specialty, widget: string }
          - label: Contact
            name: contact
            widget: object
            fields:
              - { label: Email,                    name: email,      widget: string }
              - { label: "Phone (display)",        name: phone,      widget: string,
                  hint: "e.g. +31 (0)6 4142 9175" }
              - { label: "Phone (digits only)",    name: phone_href, widget: string,
                  hint: "e.g. +31641429175" }
              - { label: Location,                 name: location,   widget: string }
