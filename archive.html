<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Archive — Amber Hooijmans, Video Editor Amsterdam</title>
  <meta name="description" content="Complete work archive of Amsterdam video editor Amber Hooijmans — 105+ projects spanning commercials, short films, music videos and documentaries since 2007.">
  <link rel="canonical" href="https://amberhooijmans.nl/archive.html">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://amberhooijmans.nl/archive.html">
  <meta property="og:title"       content="Full Archive — Amber Hooijmans, Video Editor Amsterdam">
  <meta property="og:description" content="105+ projects spanning commercials, short films, music videos and documentaries since 2007.">
  <meta property="og:image"       content="https://amberhooijmans.nl/assets/images/thumbnails/peggy.jpg">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Full Archive — Amber Hooijmans, Video Editor Amsterdam">
  <meta name="twitter:description" content="105+ projects spanning commercials, short films, music videos and documentaries since 2007.">
  <meta name="twitter:image"       content="https://amberhooijmans.nl/assets/images/thumbnails/peggy.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="archive-page">

<!-- NAV -->
<nav id="nav">
  <a href="index.html" class="nav-logo">Amber Hooijmans</a>
  <div class="nav-links" id="navLinks">
    <a href="index.html#work">Work</a>
    <a href="archive.html" class="nav-active">Archive</a>
    <a href="index.html#about">About</a>
    <a href="index.html#contact">Contact</a>
  </div>
  <button class="nav-hamburger" id="navToggle" aria-label="Menu">
    <span></span><span></span>
  </button>
</nav>

<!-- ARCHIVE HERO -->
<section class="arc-hero">
  <div class="arc-hero-content">
    <h1 class="arc-hero-title">
      <span class="hero-line">Archive</span>
    </h1>
    <p class="arc-subtitle" id="arcSubtitle">105 projects · 2007–2025</p>
  </div>
</section>

<!-- FILTERS -->
<div class="arc-filters" id="arcFilters">
  <div class="arc-filter-top">
    <div class="arc-category-btns" id="arcCategoryBtns">
      <button class="filter-btn is-active" data-filter="all">All <sup id="arc-count-all"></sup></button>
      <button class="filter-btn" data-filter="commercial">Commercial <sup id="arc-count-commercial"></sup></button>
      <button class="filter-btn" data-filter="film">Film <sup id="arc-count-film"></sup></button>
      <button class="filter-btn" data-filter="music-video">Music Video <sup id="arc-count-music-video"></sup></button>
      <button class="filter-btn" data-filter="documentary">Documentary <sup id="arc-count-documentary"></sup></button>
      <button class="filter-btn" data-filter="fashion">Fashion <sup id="arc-count-fashion"></sup></button>
    </div>
    <div class="arc-search-wrap">
      <svg class="arc-search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.3"/>
        <path d="M10 10L13 13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <input class="arc-search" id="arcSearch" type="text" placeholder="Search title or director…" autocomplete="off" spellcheck="false">
    </div>
  </div>
  <div class="arc-year-btns" id="arcYearBtns">
    <!-- populated by JS -->
  </div>
</div>

<!-- GRID -->
<div class="arc-grid" id="arcGrid"></div>

<!-- EMPTY STATE -->
<div class="arc-empty" id="arcEmpty">
  <p>No projects match your search.</p>
</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-inner">
    <span class="footer-name">Amber Hooijmans</span>
    <span class="footer-year">&copy; 2026</span>
  </div>
</footer>

<!-- VIDEO MODAL -->
<div id="videoModal" class="video-modal" role="dialog" aria-modal="true" aria-label="Video player">
  <button class="modal-close" id="modalClose" aria-label="Close video">&times;</button>
  <div class="modal-inner">
    <div class="modal-video-col">
      <div class="modal-iframe-wrap" id="modalIframeWrap"></div>
    </div>
    <div class="modal-credits-col" id="modalCreditsCol"></div>
  </div>
</div>

<script src="js/archive.js"></script>
</body>
</html>
